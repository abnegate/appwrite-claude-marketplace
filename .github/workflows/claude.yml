name: claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]
  pull_request:
    types: [opened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  bot-review:
    name: review bot PRs
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      IS_BOT_PR: ${{ startsWith(github.head_ref, 'bot/') }}
    steps:
      - name: Skip non-bot PRs
        if: env.IS_BOT_PR != 'true'
        run: echo "Not a bot/* PR -- nothing to review."

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: env.IS_BOT_PR == 'true'
        with:
          fetch-depth: 0
          token: ${{ secrets.CLAUDE_PUSH_TOKEN }}

      - name: Set up PHP
        if: env.IS_BOT_PR == 'true'
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        if: env.IS_BOT_PR == 'true'
        run: composer install --no-interaction --prefer-dist --no-progress

      - uses: anthropics/claude-code-action@b3c0320e7e8228fcafe773fda5bfd427aa8d1c34 # v1
        if: env.IS_BOT_PR == 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --model claude-opus-4-7
            --dangerously-skip-permissions
          prompt: |
            You are reviewing a `bot/*` pull request auto-generated by
            `sync-libraries.yml` or `scan-commits.yml`.

            1. Check out the PR branch.
            2. Run `composer install` if `vendor/` is missing, then
               `bin/marketplace validate`, `bin/marketplace index`, and
               `vendor/bin/phpunit`.
            3. Sanity-check every scaffolded or modified skill against
               the upstream source (use `gh api` to fetch the cited
               repo files). Flag any fabricated APIs, missing citations,
               or stale frontmatter.
            4. Post a single review comment on the PR summarising: what
               looks correct, what looks risky, and any concrete fix
               suggestions.

            Constraints:
            - Never invent APIs. Cite an upstream commit or source file
              for every factual claim.
            - Frontmatter `description` must remain <= 500 chars.
            - Never modify hooks or settings outside of what was
              explicitly requested.
            - If you cannot complete the review safely, post a comment
              explaining why and exit non-zero so auto-merge does not
              fire.

  mentions:
    name: respond to @claude mentions
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    env:
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.CLAUDE_PUSH_TOKEN }}

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # v2.37.0
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - uses: anthropics/claude-code-action@b3c0320e7e8228fcafe773fda5bfd427aa8d1c34 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          claude_args: |
            --model claude-opus-4-7
            --dangerously-skip-permissions
          prompt: |
            You are responding to an `@claude` mention. The event type
            is in the `EVENT_NAME` environment variable. Read the full
            event payload via `gh api` (e.g.
            `gh api "/repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER"`).

            1. Read the surrounding context (the PR diff, the issue
               body, the existing files).
            2. Apply the requested change. Stay within the marketplace
               conventions in `README.md`, `CLAUDE.md`, and the
               existing skill / command / agent / hook structure.
            3. Run `composer install` (if needed) and the validators
               and PHPUnit suite (`bin/marketplace validate`,
               `bin/marketplace index`, `vendor/bin/phpunit`).
            4. Push a commit to the PR branch (or open a new PR for
               issue mentions) with a clear conventional-commit message.

            Constraints:
            - Never invent APIs. Cite an upstream commit or source file
              for every factual claim.
            - Frontmatter `description` must remain <= 500 chars.
            - Never modify hooks or settings outside of what was
              explicitly requested.
            - If you cannot complete the request safely, post a comment
              explaining why and stop.
